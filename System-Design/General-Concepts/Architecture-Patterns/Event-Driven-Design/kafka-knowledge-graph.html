<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Driven Design: Kafka Knowledge Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1629 100%);
            color: #e0e0e0;
            font-family: 'Sora', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.95);
            border-bottom: 2px solid #00d4ff;
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        h1 {
            font-size: 2em;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
            transition: width 0.3s ease;
        }

        .nav-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .pill {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }

        .pill:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            transform: translateY(-2px);
        }

        .pill.active {
            background: #00d4ff;
            color: #0a0e1a;
            border-color: #00d4ff;
        }

        .pill.completed::after {
            content: " \2713";
            color: #4ade80;
        }

        .pill.completed {
            border-color: #4ade8060;
        }

        .topic-checkbox {
            margin-left: auto;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #00d4ff;
            flex-shrink: 0;
        }

        main {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        details {
            border-left: 4px solid #00d4ff;
            background: rgba(20, 30, 60, 0.6);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        details[open] {
            background: rgba(20, 30, 60, 0.9);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
        }

        summary {
            padding: 20px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 1.1em;
            color: #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        summary:hover {
            background: rgba(0, 212, 255, 0.05);
            padding-left: 24px;
        }

        details[open] > summary {
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.05);
        }

        summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 10px;
            transition: transform 0.3s ease;
            color: #7c3aed;
        }

        details[open] > summary::before {
            transform: rotate(90deg);
        }

        .card-content {
            padding: 30px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 3000px;
            }
        }

        .topic-number {
            display: inline-block;
            background: #7c3aed;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: 700;
            margin-right: 12px;
        }

        .narrative {
            color: #b0b0b0;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 0.95em;
        }

        .narrative strong {
            color: #00d4ff;
        }

        .nested-details {
            margin-top: 20px;
            padding: 0;
            border-left: 3px solid #5b21b6;
        }

        .nested-details summary {
            padding: 12px 16px;
            font-size: 0.95em;
            background: rgba(91, 33, 182, 0.1);
            color: #b0b0b0;
        }

        .nested-details[open] {
            background: rgba(91, 33, 182, 0.08);
        }

        .nested-details > summary::before {
            color: #5b21b6;
        }

        .nested-content {
            padding: 16px;
            color: #a0a0a0;
            font-size: 0.9em;
            line-height: 1.7;
        }

        .nested-content strong {
            color: #7c3aed;
        }

        .nested-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            color: #7c3aed;
        }

        .nested-content ul {
            margin: 10px 0 10px 20px;
        }

        .nested-content li {
            margin: 5px 0;
        }

        .interview-answer {
            background: linear-gradient(135deg, rgba(91, 33, 182, 0.2) 0%, rgba(124, 58, 237, 0.1) 100%);
            border-left: 4px solid #00d4ff;
            border-radius: 6px;
            padding: 20px;
            margin-top: 25px;
            color: #d0d0d0;
            font-style: italic;
            line-height: 1.8;
        }

        .interview-answer strong {
            color: #00d4ff;
            font-style: normal;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        table th {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #00d4ff;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            color: #b0b0b0;
        }

        table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        pre {
            background: rgba(0, 0, 0, 0.5);
            border-left: 3px solid #7c3aed;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 15px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            line-height: 1.5;
            color: #00d4ff;
        }

        code {
            color: #7c3aed;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            main {
                padding: 0 20px;
            }

            .header-content {
                padding: 0 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .nav-pills {
                gap: 6px;
            }

            .pill {
                font-size: 0.75em;
                padding: 6px 10px;
            }

            summary {
                font-size: 1em;
                padding: 16px;
            }

            .card-content {
                padding: 20px;
            }

            table {
                font-size: 0.75em;
            }

            table th, table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Event-Driven Design: Kafka Knowledge Graph</h1>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;font-size:0.9rem;color:#a0a0a0;">
                <span id="progressText">0 / 8 topics completed</span>
                <span style="color:#00d4ff;font-size:0.8rem;">Check boxes to track progress</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="nav-pills" id="navPills"></div>
        </div>
    </header>

    <main>
        <div class="cards-grid" id="cardsGrid"></div>
    </main>

    <footer>
        <p>Event-Driven Architecture: Complete Architect-Level Knowledge Graph</p>
        <p style="margin-top: 10px; font-size: 0.85em;">Built for senior engineers preparing for system design interviews</p>
    </footer>

    <script>
        function createCard(topicNum, title, htmlContent) {
            const card = document.createElement('details');
            card.id = `card-${topicNum - 1}`;
            card.innerHTML = `
                <summary><span class="topic-number">${topicNum}</span>${title}</summary>
                <div class="card-content">${htmlContent}</div>
            `;
            return card;
        }

        function renderNavPills() {
            const navPills = document.getElementById('navPills');
            const topics = ['Core Principles', 'Messaging Options', 'Kafka Internals', 'Kafka Configs', 'Delivery Semantics', 'Kafka Performance', 'Outbox Pattern', 'Saga Pattern'];
            topics.forEach((topic, idx) => {
                const pill = document.createElement('button');
                pill.className = 'pill';
                pill.textContent = `${idx + 1}. ${topic}`;
                pill.onclick = () => scrollToCard(idx);
                navPills.appendChild(pill);
            });
        }

        function scrollToCard(index) {
            const cards = document.querySelectorAll('details');
            cards[index]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            cards[index]?.click();
        }

        function renderCards() {
            const cardsGrid = document.getElementById('cardsGrid');
            cardsGrid.innerHTML = '';

            cardsGrid.appendChild(createPrinciplesCard());
            cardsGrid.appendChild(createMessagingCard());
            cardsGrid.appendChild(createKafkaInternalsCard());
            cardsGrid.appendChild(createKafkaConfigsCard());
            cardsGrid.appendChild(createDeliveryCard());
            cardsGrid.appendChild(createPerformanceCard());
            cardsGrid.appendChild(createOutboxCard());
            cardsGrid.appendChild(createSagaCard());
        }

        function createPrinciplesCard() {
            return createCard(1, 'Core Principles & Mental Model', `
                <div class="narrative">
                    Event-driven architecture represents a fundamental shift in how systems think about communication and state change. Rather than building tightly coupled request-response chains, we think in terms of <strong>what happened</strong> — immutable facts that multiple independent services can react to.
                </div>

                <div class="narrative">
                    In traditional architectures, Service A calls Service B which calls Service C. Each service waits for a response. This creates tight coupling — if B changes its API, A breaks. In event-driven systems, Service A publishes an <strong>event</strong> saying "something happened." Service B and C independently subscribe to that event and react asynchronously. Neither knows the other exists. This decoupling is the core insight that makes event-driven architecture powerful.
                </div>

                <details class="nested-details">
                    <summary>Asynchronous Communication</summary>
                    <div class="nested-content">
                        <strong>Why It Matters:</strong> Synchronous communication creates chains of waiting. Threads, connections, memory — all waiting. In microservices with many services, synchronous chains become bottlenecks. One slow service cascades latency everywhere. Asynchronous communication decouples timing. A producer fires an event. Consumers process whenever they have capacity. This is how real systems handle load spikes.<br><br>
                        <strong>Real Example:</strong> In e-commerce, when a customer places an order, the Order Service publishes <code>OrderPlaced</code>. Payment Service, Inventory Service, Notification Service each independently subscribe and react asynchronously — debiting the card, reserving stock, sending confirmation. None blocks. None knows about the others. The entire system remains responsive even if inventory takes 5 seconds.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Loose Coupling</summary>
                    <div class="nested-content">
                        <strong>Why It Matters:</strong> Tight coupling is the enemy of scale. If Service A must know about Services B, C, and D, then adding Service E requires changing A. Changes ripple. Teams can't move independently. Loose coupling means teams own their services end-to-end. You only need to agree on the event contract — the schema — not implementation details.<br><br>
                        <strong>Real Example:</strong> In authentication, the Auth Service publishes <code>UserRegistered</code>. Years later, the Product team adds a Referral Service that starts consuming that event. No changes to Auth. No redeployment. Referral wires up independently.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Event Immutability & Idempotent Processing</summary>
                    <div class="nested-content">
                        <strong>Event Immutability:</strong> Events are immutable facts. Once published, they can't change. This creates an audit trail and lets you replay events to understand system state at any point in time. Mutable events mean there's no single source of truth.<br><br>
                        <strong>Idempotent Processing:</strong> The network fails. Brokers crash. Consumers crash after processing but before acknowledging. Retries are necessary, but they mean an event might be processed twice. If your handler isn't idempotent, processing twice means double charges or duplicate records. Idempotent handlers are safe — processing the same event 10 times produces the same outcome as once.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Eventual Consistency</summary>
                    <div class="nested-content">
                        <strong>Why It Matters:</strong> Strong consistency requires distributed consensus, which is expensive and slow. Eventual consistency trades immediate synchronization for availability and responsiveness. After an order is placed, inventory eventually reflects the new stock level. This is pragmatic — systems tolerate some inconsistency for brief windows.<br><br>
                        <strong>Real Example:</strong> When a customer is granted premium status, the User Service publishes <code>CustomerUpgradedToPremium</code>. Analytics, Recommendation, and Billing services all consume this asynchronously. For a moment, Analytics might show the old status, but within 500ms, all services reflect the upgrade.
                    </div>
                </details>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "Event-driven design is fundamentally about decoupling systems through asynchronous, immutable facts. Instead of Service A calling Service B calling Service C — creating dependencies — we have Service A publish an event, and B and C independently react. This removes coupling, which is the core problem it solves. Three principles I focus on: First, loose coupling — consumers don't know about producers. Second, idempotent processing — the network fails, messages redeliver, handlers must be safe to invoke multiple times. Third, observable event flow — every event needs a correlation ID for tracing in distributed systems."
                </div>
            `);
        }

        function createMessagingCard() {
            return createCard(2, 'Choosing Your Messaging System', `
                <div class="narrative">
                    When you choose a messaging system, you're not just picking a technology — you're deciding how your services will fail, how much data you can afford to lose, and whether your team will sleep well at night. This decision cascades through your entire event-driven architecture.
                </div>

                <div class="narrative">
                    Before opening any comparison table, ask: <strong>What is your throughput ceiling?</strong> Your absolute peak plus 50% headroom. <strong>What is your relationship with message loss?</strong> You can lose notifications. You cannot lose payments. <strong>How far back must you replay?</strong> The last 7 days? The last year? Forever? <strong>Where does your data live?</strong> AWS-only? Multi-cloud? On-premises?
                </div>

                <details class="nested-details">
                    <summary>Apache Kafka: Event Streaming at Scale</summary>
                    <div class="nested-content">
                        <strong>When to Pick:</strong> High-volume event streaming with replay needs. 100M+ events/day. 50M users generating 100K events/second at peak. Need notifications, audit logs, segment recalculation, and ML training on historical data.<br><br>
                        <strong>The Win:</strong> One <code>user-events</code> topic (100 partitions) handles all throughput. Notifications service filters. Audit team queries retained logs. ML team replays six months. Each service operates independently.<br><br>
                        <strong>The Cost:</strong> Operational complexity. ZooKeeper or KRaft, monitor broker health, tune replication factors, debug lag. Managed Kafka solves this but costs more.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>RabbitMQ: Complex Routing</summary>
                    <div class="nested-content">
                        <strong>When to Pick:</strong> Complex content-based routing. A logistics company routing shipment events: fragile packages go to one team, perishable to another, hazardous to compliance. RabbitMQ's headers-based routing is elegant.<br><br>
                        <strong>The Win:</strong> Flexible topology. One exchange fans out to multiple queues based on message content. Built-in dead-letter queues. Hybrid cloud deployments are simpler.<br><br>
                        <strong>The Limit:</strong> Throughput around 50K-500K msgs/sec. Beyond that, you're sharded and have coordination problems.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Redis Pub/Sub: Real-Time Fire-and-Forget</summary>
                    <div class="nested-content">
                        <strong>When to Pick:</strong> Real-time systems where latency is the constraint. Collaborative editors (sub-100ms keystroke broadcast). Gaming (live leaderboards). Monitoring dashboards (live metrics).<br><br>
                        <strong>The Win:</strong> Simplicity. Sub-millisecond latency. Zero operational overhead — you already run Redis for caching.<br><br>
                        <strong>The Constraint:</strong> No durability. No replay. If a subscriber is offline, it misses messages forever. Acceptable for dashboards. Not for payments.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>AWS SNS/SQS: Vendor-Managed Simplicity</summary>
                    <div class="nested-content">
                        <strong>When to Pick:</strong> You're a startup with three engineers on AWS. SNS fans out. SQS buffers. Auto-scaling is automatic. You avoid operational burden completely.<br><br>
                        <strong>The Trade-off:</strong> Vendor lock-in. Pay per-message at scale. No message ordering in standard queues (FIFO limited to 300 msgs/sec). But you focus on features, not infrastructure.<br><br>
                        <strong>The Pattern:</strong> SNS topic → multiple SQS queues. Orders placed → SNS fanout → SQS for inventory, payments, analytics. Each team owns their queue.
                    </div>
                </details>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "I start with non-functional requirements: throughput at peak, latency p99, retention window, whether the business tolerates loss. For high-volume event streaming with replay needs (billions daily), Kafka wins despite operational complexity. For AWS-native startups, SNS/SQS is pragmatic. For real-time, non-durable messaging, Redis Pub/Sub is fastest. For complex routing, RabbitMQ's exchange patterns are elegant. The critical architectural decision is the partition strategy — get this wrong and you'll regret it for years. I also consider team expertise and operational budget. Kafka requires platform engineers. SNS/SQS requires AWS knowledge but less systems expertise."
                </div>
            `);
        }

        function createKafkaInternalsCard() {
            return createCard(3, 'Kafka Internals: Architecture That Scales', `
                <div class="narrative">
                    Understanding Kafka's internals — how it manages partitions, replication, leadership, and coordination — is the difference between building systems that scale gracefully and building systems that fail at 2 AM under load. You need to reason about throughput bottlenecks, durability guarantees, and failure scenarios with confidence.
                </div>

                <div class="narrative">
                    A single log file on a single machine is ordered but not scalable. Kafka solves this by partitioning the log strategically, replicating each partition, tracking which replicas are synchronized, and coordinating without requiring a separate system.
                </div>

                <details class="nested-details">
                    <summary>Topics, Partitions & Offsets</summary>
                    <div class="nested-content">
                        <strong>The Insight:</strong> A topic is logical. A partition is where the real work happens. One topic with N partitions is really N independent logs, each ordered internally but not globally. This unlocks parallelism: ten consumers can read simultaneously — one per partition.<br><br>
                        <strong>Partition Count Rule:</strong> <code>Partition count ≈ (target_throughput_MB_per_sec) / (single_consumer_throughput_MB_per_sec)</code>. If one consumer handles 10 MB/sec and you want 100 MB/sec total, you need ten partitions. Overprovision slightly (12-15) for growth.<br><br>
                        <strong>Offsets:</strong> Your consumer tracks a position — an offset. Offset 0 is the first message. Offset 1000 is the 1001st. Your consumer reads 0-999, crashes, comes back, seeks to offset 1000, and continues. No broker coordination needed. This enables replay, multiple independent consumers, and durability without special ops.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>ISR: The Heart of Durability</summary>
                    <div class="nested-content">
                        <strong>What ISR Actually Means:</strong> A replica is in-sync if it actively replicates from the leader AND sends a fetch request within <code>replica.lag.time.max.ms</code> (default 10 seconds). The leader just tracks "did this replica fetch recently?" If yes, it's in-sync. If no, something is wrong.<br><br>
                        <strong>Real Scenario:</strong> Broker 2's disk experiences latency. At T=12 seconds, broker 2 hasn't fetched in 10+ seconds. ISR shrinks to [0,1]. Broker 2 is now lagging. When it catches up, ISR expands back to [0,1,2].<br><br>
                        <strong>Critical Config:</strong> <code>min.insync.replicas = replication_factor - 1</code>. With RF=3, use min.insync=2. Producer only gets confirmation when the message is on at least 2 brokers. One can fail and you're still safe.<br><br>
                        <strong>War Story:</strong> I once set <code>min.insync.replicas=1</code> and a network partition happened. An out-of-sync replica became leader. We had divergent message histories and lost data. After that: never again min.insync=1. The minimum is 2.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>ZooKeeper vs. KRaft: Coordination Evolution</summary>
                    <div class="nested-content">
                        <strong>The Old Way (ZooKeeper):</strong> Kafka delegated cluster state to external ZooKeeper. ZooKeeper stored broker membership, topic metadata, ISR state, controller election. Problem: slow. Metadata changes could take seconds. You had to operate two clusters. Scalability limits at ~50,000 partitions.<br><br>
                        <strong>The New Way (KRaft, Kafka 3.3+):</strong> Kafka uses Kafka Raft consensus built into Kafka itself. A subset of brokers form a Quorum Controller cluster. Cluster metadata stored in <code>__cluster_metadata</code> — replicated using Raft. Metadata latency: 1-5 seconds → <100ms. No external dependency. Tested with 100,000+ partitions.<br><br>
                        <strong>Migration Path:</strong> KRaft is production-ready. New clusters use KRaft. ZooKeeper clusters in maintenance mode. You can run hybrid for transition.
                    </div>
                </details>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "Kafka's durability comes from replication and the In-Sync Replica Set. Each partition has one leader and N-1 replicas. ISR contains only replicas actively caught up — fetching within <code>replica.lag.time.max.ms</code>. When a producer sends with <code>acks=all</code>, it waits for the leader plus all ISR members to acknowledge. If the leader fails, a new leader is elected from ISR, and no committed messages are lost. Trade-off: larger ISR = higher latency but better durability. This is why <code>min.insync.replicas</code> exists — enforce a minimum safety floor. I set it to at least 2, typically <code>(replication_factor // 2) + 1</code>. In KRaft mode, cluster coordination is built into Kafka using Raft, improving metadata latency dramatically."
                </div>
            `);
        }

        function createKafkaConfigsCard() {
            return createCard(4, 'Kafka Configuration: Production Tuning', `
                <div class="narrative">
                    Kafka's defaults are optimized for getting started, not for production. Every configuration is a tradeoff between durability and throughput, latency and efficiency, consistency and availability. Your job is knowing which knobs to turn and why — the difference between a system that barely limps along and one that handles millions of events per second without losing a message.
                </div>

                <div class="narrative">
                    Match your configuration to your system's constraints. A financial payment system has zero tolerance for data loss but can accept 100ms latency. A real-time notification system is the opposite: losing an event is fine, but 2-second delays are unacceptable.
                </div>

                <details class="nested-details">
                    <summary>Broker: Durability Foundations</summary>
                    <div class="nested-content">
                        <strong>Replication Factor:</strong> Default is 1 (one copy). For production, use 3. One copy means one failure loses your data. Three copies tolerate two simultaneous failures. Non-negotiable for HA.<br><br>
                        <strong>Min In-Sync Replicas:</strong> Set to <code>replication_factor - 1</code>. With RF=3, use 2. Producer waits for confirmation only when message is safely on disk on at least 2 brokers.<br><br>
                        <strong>Unclean Leader Election:</strong> Keep false. Never allow out-of-sync replicas to become leaders. Yes, you lose availability, but you keep durability. For systems that can't lose data, durability wins.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Producer: Durability Trinity</summary>
                    <div class="nested-content">
                        <strong>acks Configuration:</strong>
                        <ul>
                            <li><code>acks=0</code>: Fire-and-forget. No durability. Use only for metrics/telemetry.</li>
                            <li><code>acks=1</code>: Leader ack only. Feels safe but allows silent data loss if leader crashes before replication.</li>
                            <li><code>acks=all</code>: Wait for all ISR members. True safety. Use for payments, orders, anything a user will ask about.</li>
                        </ul>
                        <strong>Enable Idempotence:</strong> Set to true. Prevents duplicate messages on retry. Requires <code>acks=all</code> and <code>max.in.flight.requests ≤ 5</code>. No downside — turn it on.<br><br>
                        <strong>Batching:</strong> <code>batch.size=32KB</code> and <code>linger.ms=50-100</code>. Accumulate messages, then send. 100ms wait is invisible but lets you batch 100-1000 messages together. This transforms latency from one-message-per-roundtrip to one-batch-per-roundtrip.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Consumer: Offset Management</summary>
                    <div class="nested-content">
                        <strong>Auto-Commit vs. Manual:</strong> Default is auto-commit every 5 seconds. Problem: if consumer crashes between auto-commit and processing, that message gets skipped. Use manual commit — commit only after successful processing and storage.<br><br>
                        <strong>Max Poll Interval:</strong> Default 5 minutes. If your processing takes 30 seconds and this is set to 5 seconds, Kafka thinks you crashed and rebalances. Set high enough for your processing time plus GC pauses. For payment processing, set to 10 minutes.<br><br>
                        <strong>Heartbeat Timeout:</strong> If consumer doesn't send a heartbeat for this long, it's considered dead. Default 45 seconds. Set <code>heartbeat.interval.ms</code> to about 1/3 of <code>session.timeout.ms</code> to ensure 3 heartbeats before eviction.
                    </div>
                </details>

                <table>
                    <thead>
                        <tr>
                            <th>Config</th>
                            <th>Default</th>
                            <th>Recommended</th>
                            <th>Why</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>default.replication.factor</td>
                            <td>1</td>
                            <td>3</td>
                            <td>Three copies tolerate two failures</td>
                        </tr>
                        <tr>
                            <td>min.insync.replicas</td>
                            <td>1</td>
                            <td>2</td>
                            <td>Producer confirmation requires 2 replicas</td>
                        </tr>
                        <tr>
                            <td>acks (producer)</td>
                            <td>1</td>
                            <td>all</td>
                            <td>Wait for all ISR for true durability</td>
                        </tr>
                        <tr>
                            <td>enable.idempotence</td>
                            <td>false</td>
                            <td>true</td>
                            <td>Exactly-once within producer session</td>
                        </tr>
                        <tr>
                            <td>batch.size</td>
                            <td>16KB</td>
                            <td>32KB</td>
                            <td>Bigger batches for throughput</td>
                        </tr>
                        <tr>
                            <td>linger.ms</td>
                            <td>0</td>
                            <td>50-100</td>
                            <td>Wait for full batch, not immediate send</td>
                        </tr>
                        <tr>
                            <td>enable.auto.commit</td>
                            <td>true</td>
                            <td>false</td>
                            <td>Manual commit prevents skipped messages</td>
                        </tr>
                        <tr>
                            <td>max.poll.interval.ms</td>
                            <td>300000</td>
                            <td>600000+</td>
                            <td>Account for processing time + GC pauses</td>
                        </tr>
                    </tbody>
                </table>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "For a payment system, I'd set <code>default.replication.factor=3</code> and <code>min.insync.replicas=2</code> to tolerate one broker failure. Producer: <code>acks=all</code>, <code>enable.idempotence=true</code>, <code>max.in.flight.requests=1</code> for strict ordering, <code>batch.size=16KB</code>, <code>linger.ms=50</code> for efficient batching. Consumer: <code>enable.auto.commit=false</code>, manual acknowledgment after persisting results, <code>max.poll.records=10</code> for small batches, <code>max.poll.interval.ms=600000</code> (10 minutes) with generous headroom for processing. This setup is slower than fire-and-forget (maybe 50–200ms added latency), but every payment is durably stored and processed exactly once. For payments, that trade-off is non-negotiable."
                </div>
            `);
        }

        function createDeliveryCard() {
            return createCard(5, 'Delivery Semantics: Loss vs. Duplicates', `
                <div class="narrative">
                    The first question any architect must ask when designing an event-driven system is about loss. What happens when a message disappears? This decision — at-most-once, at-least-once, or exactly-once — shapes everything downstream: your consumer logic, your monitoring strategy, your data pipeline, your financial exposure.
                </div>

                <div class="narrative">
                    The journey from "fire and forget" to "exactly once" is a progression of costs. Each level adds durability but also adds latency, complexity, and operational burden. Most systems don't need the highest level.
                </div>

                <details class="nested-details">
                    <summary>At-Most-Once: The Risk of Silent Loss</summary>
                    <div class="nested-content">
                        <strong>What It Means:</strong> A message might be lost, but you'll never acknowledge it twice. The loss is silent. Discover it by comparing source counts to Kafka counts after the fact.<br><br>
                        <strong>When It's Right:</strong> Real-time dashboards (if a metric is 999 instead of 1000, nobody notices). Approximate metrics (unique visitors, trending topics). Telemetry pipelines (individual lost events don't matter; patterns do).<br><br>
                        <strong>Why Teams Avoid It:</strong> Data loss is insidious. It doesn't fail loudly. You discover weeks later that some orders are missing. The latency advantage is usually negated by later debugging. Start with at-least-once instead.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>At-Least-Once: The Workhorse Default</summary>
                    <div class="nested-content">
                        <strong>What It Means:</strong> A message is delivered at least once, and possibly more if something breaks during processing. Durability is guaranteed. Duplicates are expected.<br><br>
                        <strong>Why This Is Right for 90% of Systems:</strong> You get durability (messages survive broker crashes), availability (no complex coordination), performance (no significant latency overhead), and debuggability (every event is in Kafka for replay).<br><br>
                        <strong>Three Deduplication Approaches:</strong>
                        <ol style="margin-left: 20px;">
                            <li><strong>Database Unique Constraint:</strong> Insert idempotency key with order. Duplicate arrives, constraint violation, skip. Simple but hot-spot at scale.</li>
                            <li><strong>Redis Cache:</strong> Fast O(1) checks, TTL auto-cleanup. Requires Redis as separate system.</li>
                            <li><strong>Dedicated Dedup Table:</strong> Purpose-built for deduplication with TTL-based cleanup. Explicit, controllable lifecycle.</li>
                        </ol>
                        <strong>Best Approach:</strong> Redis cache on top of database. Fast path for 99% of requests. Database fallback for cache misses or Redis crashes.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Exactly-Once: The Holy Grail with a Price</summary>
                    <div class="nested-content">
                        <strong>What It Means:</strong> Combines idempotent producer (broker deduplication) + idempotent consumer (database deduplication) + atomic transactions. Every layer has its guard rail.<br><br>
                        <strong>How It Works:</strong> Producer includes <code>transactional.id</code> and <code>enable.idempotence=true</code>. Kafka tracks producer ID + sequence number. Duplicate messages rejected by broker. Consumer reads only committed messages (<code>isolation.level=read_committed</code>). Consumer's transaction boundary ensures database updates and offset commits succeed together or both fail.<br><br>
                        <strong>The Cost:</strong> 40-50% throughput reduction. 3-4x higher latency. Synchronous flush to disk. Smaller batches. Is it worth it? Ask: <strong>Is the cost of a duplicate greater than the cost of the performance penalty?</strong><br><br>
                        <strong>When It's Worth It:</strong> Payments (duplicate charge is unrecoverable pain), inventory updates (duplicate deduction causes overselling), financial transfers (duplicating $1M is catastrophic), account balances (every write must be exact).<br><br>
                        <strong>When It's Overkill:</strong> Analytics (duplicate events are visible), dashboards (approximate counts are fine), metrics (small errors acceptable), log aggregation (storage is cheap).
                    </div>
                </details>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "Delivery semantics is the foundational architectural decision. At-most-once trades durability for speed — appropriate only for metrics and dashboards. At-least-once with idempotent consumers is the workhorse default. Duplicates happen (network retries, consumer crashes), so handlers check 'have I processed this ID before?' using a database, Redis cache, or dedicated dedup table. Exactly-once adds producer deduplication and atomic transactions, reducing throughput 40-50% but guaranteeing no duplicates. I use exactly-once for payments and critical financial data. For everything else, at-least-once plus idempotency is simpler and sufficient. The key is designing handlers that are naturally idempotent — using IDs as dedup keys, not side-effect functions."
                </div>
            `);
        }

        function createPerformanceCard() {
            return createCard(6, 'Kafka Performance Tuning & Incident Response', `
                <div class="narrative">
                    Kafka performance isn't about making it fast — it's about understanding what "fast" means for YOUR system and tuning accordingly. Most Kafka performance problems aren't mysteries. They follow patterns. Your job is to know your SLA, measure relentlessly, and tune systematically.
                </div>

                <div class="narrative">
                    The fundamental trade-off: throughput vs. latency. A payment alerting system needs 100ms. An analytics pipeline needs to process 1M events/day but can accept 5-second latency. Choose the wrong optimization and you'll struggle for months.
                </div>

                <details class="nested-details">
                    <summary>The Throughput-Latency Trade-off</summary>
                    <div class="nested-content">
                        <strong>High-Throughput Analytics:</strong> batch.size=64KB, linger.ms=100, acks=1, compression=snappy. Consumer: fetch.min.bytes=100KB, max.poll.records=1000. Result: 5K msgs/sec per consumer, 5-10s latency accepted.<br><br>
                        <strong>Low-Latency Alerts:</strong> batch.size=1, linger.ms=0, acks=all. Consumer: fetch.min.bytes=100, max.poll.records=10. Result: ~100ms E2E, ~1K msgs/sec per consumer.<br><br>
                        <strong>Balanced Production:</strong> batch.size=32KB, linger.ms=10, acks=1, compression=lz4. Consumer: fetch.min.bytes=10KB, max.poll.records=500. Result: 2-3K msgs/sec per consumer, 200-500ms latency.<br><br>
                        Your job in the interview is to ask: "What's the SLA?" Until you know that, you're just guessing.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Consumer Lag: Your Most Important Metric</summary>
                    <div class="nested-content">
                        <strong>What Lag Really Means:</strong> Not just "messages behind" but TIME behind. Convert to seconds: <code>lag_in_seconds = lag_in_messages / (msgs_per_second_consumed)</code>. If you have 100K messages of lag and your consumer processes 1K msgs/sec, that's 100 seconds = 1.5 minutes behind.<br><br>
                        <strong>Healthy vs. Critical:</strong>
                        <ul>
                            <li><strong>Healthy:</strong> Lag flat or slowly decreasing. Lag in seconds &lt; 10% of SLA.</li>
                            <li><strong>Concerning:</strong> Lag growing. Lag in seconds = 20-50% of SLA. Check consumer health. Is processing slow?</li>
                            <li><strong>Critical:</strong> Lag ≥ 80% of SLA or growing rapidly. Page on-call. Start incident.</li>
                        </ul>
                        <strong>Real-Time Metric:</strong> <code>lag_delta = current_lag - lag_5_minutes_ago</code>. If lag_delta &gt; 0 and growing &gt; 1K msgs/min, you have 10-20 minutes before SLA breach.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Incident Response: High Lag Playbook</summary>
                    <div class="nested-content">
                        <strong>Minute 1 (Triage):</strong> Run <code>kafka-consumer-groups --describe</code>. Which partitions are behind? Are all assigned? If partition is unassigned, jump to rebalancing.<br><br>
                        <strong>Minute 3 (Broker Health):</strong> Check CPU (bottleneck?), network in (spiking or flat?), disk I/O, GC logs.<br><br>
                        <strong>Minute 5 (Consumer Health):</strong> Is the process alive? Check application logs for errors, timeouts, exceptions.<br><br>
                        <strong>Emergency Fixes (in order of speed):</strong>
                        <ol style="margin-left: 20px;">
                            <li><strong>Increase max.poll.records</strong> (2 minutes): Each poll grabs more messages. If processing is parallelizable, catch up faster.</li>
                            <li><strong>Add Consumer Instances</strong> (10 minutes): Spin up 2-4 more. Kafka rebalances automatically. Throughput increases.</li>
                            <li><strong>Lower fetch.max.wait.ms</strong> (5 minutes): Consumers poll more frequently. Less batching, faster feedback.</li>
                            <li><strong>Check for Poison Messages</strong> (10 minutes): A message causing 30-second hangs will spike lag on that partition. Skip it and redeploy.</li>
                        </ol>
                    </div>
                </details>

                <table>
                    <thead>
                        <tr>
                            <th>Pattern</th>
                            <th>Evidence</th>
                            <th>Root Cause</th>
                            <th>Fix</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Slow growth</td>
                            <td>Lag increases ~5K msgs/min</td>
                            <td>Processing time creeping up</td>
                            <td>Profile processing; cache API; add DB indexes</td>
                        </tr>
                        <tr>
                            <td>Sudden spike, plateau</td>
                            <td>Lag jumps 100K, stays</td>
                            <td>Rebalancing or GC pause</td>
                            <td>Check rebalance cycles; increase heap; tune GC</td>
                        </tr>
                        <tr>
                            <td>Uneven across partitions</td>
                            <td>One partition 500K behind</td>
                            <td>Key skew or slow broker</td>
                            <td>Check key distribution; if even, scale brokers</td>
                        </tr>
                        <tr>
                            <td>Spikes every 30min</td>
                            <td>Regular pattern</td>
                            <td>Hourly batch job competing</td>
                            <td>Schedule batch off-peak; reduce concurrency</td>
                        </tr>
                        <tr>
                            <td>Only peak hours</td>
                            <td>Flat night, climbs day</td>
                            <td>Underdimensioned for peak</td>
                            <td>Capacity planning; add brokers/consumers</td>
                        </tr>
                    </tbody>
                </table>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "Kafka performance is about understanding your constraint. Throughput or latency? For throughput, tune producer batching (batch.size=64KB, linger.ms=100) and consumer batching (max.poll.records=1000). For latency, minimize batching (batch.size=1, linger.ms=0) and tune fetch parameters. The real skill is monitoring. Export consumer lag in seconds, not messages. Track lag growth rate — if lag is growing, you'll breach SLA soon. When lag spikes, diagnose systematically: Is this partition assigned? Is lag even across all partitions? Is the broker CPU maxed? Is the consumer processing slow? Emergency fixes: scale consumers (fastest), increase max.poll.records (immediate), or skip poison messages. Most lag problems are solved by horizontal scaling (add consumers) or fixing the consumer's processing logic (profiling, caching, indexing)."
                </div>
            `);
        }

        function createOutboxCard() {
            return createCard(7, 'The Outbox Pattern: Atomic Writes', `
                <div class="narrative">
                    The Outbox Pattern solves the dual-write problem: how to atomically persist domain data and events without distributed transactions. It's an architect-level pattern that prevents the subtle, permanent inconsistencies that plague event-driven systems.
                </div>

                <div class="narrative">
                    The problem: Your order service writes an order to the database, then tries to publish an event to Kafka. The database succeeds. Kafka is unreachable. The event was never published. Your inventory system never decremented stock. Your warehouse never received a pick list. The customer was charged, but nothing else knows about it.
                </div>

                <details class="nested-details">
                    <summary>Why Naive Solutions Fail</summary>
                    <div class="nested-content">
                        <strong>Write DB, Then Publish:</strong> Seems reasonable. Commit your data first. Then publish. What breaks: the network fails between the two. Your database has the order, but the event sits undelivered. Failure mode: persistent, undetectable inconsistency.<br><br>
                        <strong>Publish, Then Write DB:</strong> Kafka accepts the event first. Then the database write fails. Kafka now has a phantom event driving phantom state changes.<br><br>
                        <strong>2-Phase Commit:</strong> Theoretically sound. Practically: distributed transactions are slow (requires both systems to support them — Kafka doesn't) and introduce operational complexity that grows worse over time.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>The Pattern: Events as Part of the Transaction</summary>
                    <div class="nested-content">
                        <strong>The Insight:</strong> What if the event wasn't separate from the database write? What if it was part of the same atomic transaction?<br><br>
                        Instead of: Write DB → Kafka (hope it works)<br>
                        You do: Write DB + Outbox Table (same transaction) → Poller → Kafka<br><br>
                        <strong>Architecture:</strong>
                        <ol style="margin-left: 20px;">
                            <li>Application writes order to <code>orders</code> table</li>
                            <li>Application writes event to <code>outbox</code> table</li>
                            <li>Both in same transaction (both succeed or both fail)</li>
                            <li>Separate poller reads unpublished events from outbox</li>
                            <li>Poller publishes to Kafka</li>
                            <li>Poller marks event as published</li>
                        </ol>
                        <strong>The Win:</strong> If Kafka is down, events sit in the database. The poller retries. Nothing is lost. If the poller dies, events remain unpublished. When it restarts, it catches up from where it left off. No window of vulnerability.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Implementation: Spring Boot + Kafka</summary>
                    <div class="nested-content">
                        <strong>The Outbox Table:</strong>
                        <pre class="terminal">CREATE TABLE outbox (
    id BIGINT PRIMARY KEY AUTO_INCREMENT,
    event_type VARCHAR(255) NOT NULL,
    aggregate_id VARCHAR(255) NOT NULL,
    payload JSON NOT NULL,
    published BOOLEAN DEFAULT FALSE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    published_at TIMESTAMP NULL,
    INDEX idx_published (published)
);</pre>
                        <strong>The Service (Transactional Boundary):</strong>
                        <code>@Transactional public void createOrder(CreateOrderRequest request)</code>
                        Everything inside this method succeeds together or fails together. Both order and outbox event are durable when the method exits.<br><br>
                        <strong>The Poller (Scheduled Task):</strong>
                        <code>@Scheduled(fixedDelay=100)</code> runs every 100ms. Fetches unpublished events. Sends to Kafka. Marks as published. If Kafka fails, the event stays unpublished and gets retried next cycle.<br><br>
                        <strong>The Consumer (Idempotent):</strong>
                        Handle duplicates gracefully. Use order ID as dedup key. Check "have I processed this ID before?" If yes, skip. If no, process and record.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Polling vs. CDC with Debezium</summary>
                    <div class="nested-content">
                        <strong>Polling (What We've Discussed):</strong>
                        ✓ Simple. Scheduled task. Easy to understand.
                        ✓ Works with any database.
                        ✗ Latency. Inherent delay between insert and publication (up to polling interval).
                        ✗ Database load. Repeated queries add noise at scale.<br><br>
                        <strong>CDC with Debezium:</strong>
                        ✓ Ultra-low latency. Events published milliseconds after insertion.
                        ✓ No repeated polling queries.
                        ✗ Operational complexity. Another component to manage.
                        ✗ Database-specific. CDC differs on Postgres (logical replication), MySQL (binlog).<br><br>
                        <strong>When to Choose:</strong> Use polling if latency SLA &lt; 500ms. Use CDC if you need &lt; 100ms latency or have 10K+ events/second.
                    </div>
                </details>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "The Outbox Pattern buys us something more valuable than low latency: it buys us correctness. We get atomic writes. No dual-write inconsistencies. No phantom events. It's simple to understand and operate. Yes, polling adds latency — on average, half the polling interval. If you poll every 100ms, average latency is 50ms. If you need sub-20ms latency, then CDC with Debezium makes sense. But that's an optimization after validating that polling's latency is actually a bottleneck. I've seen teams reach for CDC thinking it's more elegant and then spend six months debugging Debezium state management. I've also seen teams poll at 10K events/second without issues. The choice depends on your SLAs and operational capacity, not on what sounds sophisticated. Idempotency on the consumer is non-negotiable — duplicates are expected. Use the aggregate ID as a dedup key."
                </div>
            `);
        }

        function createSagaCard() {
            return createCard(8, 'The Saga Pattern: Distributed Transactions', `
                <div class="narrative">
                    The Saga Pattern solves distributed transactions — coordinating long-running processes across multiple services without 2-phase commit. It represents a fundamental shift in thinking: stop trying to distribute ACID properties. Instead, break the big transaction into a sequence of local transactions, each with an undo operation. Trade immediate consistency for eventual consistency, but keep the system available and responsive.
                </div>

                <div class="narrative">
                    Two-Phase Commit sounded great until you had to operate it at scale. Availability costs. If the coordinator dies, all transactions hang. Latency penalty. Synchronous coordination becomes a chokepoint. Lock contention. Deadlocks become endemic. The Saga Pattern exists because 2PC fails in production.
                </div>

                <details class="nested-details">
                    <summary>Choreography: Event-Driven Democracy</summary>
                    <div class="nested-content">
                        <strong>The Idea:</strong> No central coordinator. Services communicate through events. When something happens, a service publishes an event. Other services listen and react. When they finish, they publish events that trigger the next step.<br><br>
                        <strong>Happy Path:</strong>
                        <pre class="terminal">Customer places order → OrderService: CREATE order
  ↓ publishes OrderCreated
  ↓
PaymentService: CHARGE payment → publishes PaymentProcessed
  ↓
InventoryService: RESERVE stock → publishes StockReserved
  ↓
ShippingService: SCHEDULE delivery → publishes DeliveryScheduled
  ↓
✓ Complete</pre>
                        <strong>Failure Handling:</strong> Payment declines. Compensation flows backward: OrderService cancels the order, InventoryService releases stock, Payment refunds if anything was charged. Each step undoes what was done before it.<br><br>
                        <strong>The Problem:</strong> With 6 services, debugging becomes a nightmare. Events scattered across 6 logs. No central visibility. "Which service was supposed to do what next?" After 6 months, you add Fraud Detection. It rejects payments and triggers compensation. Now Inventory, Shipping, Notification all have to know about fraud rejection. The "decoupling" was illusory — coupling is now implicit and distributed. Choreography works cleanly for &lt; 5 services with linear flows. Beyond that, operational complexity exceeds the benefit.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Orchestration: Centralized Director</summary>
                    <div class="nested-content">
                        <strong>The Idea:</strong> A single Saga Orchestrator owns the workflow. It tells each service what to do, waits for a response, then decides the next step.<br><br>
                        <strong>The Flow:</strong>
                        <pre class="terminal">Customer places order → OrderService: CREATE order, SEND to Orchestrator
  ↓
Orchestrator: "I'll manage this" → sends ProcessPayment command
  ↓
PaymentService: CHARGE, respond with PaymentOK
  ↓
Orchestrator: "Success. Next: reserve inventory" → sends ReserveStock command
  ↓
[continues until success or failure triggers compensation]</pre>

                        <strong>The Win:</strong> Total visibility. You know exactly what's been done and what's next. Debugging is trivial — everything's in one place. Testing is easy.<br><br>
                        <strong>The Problem:</strong> The Orchestrator is a coordination point. If it fails, sagas stall. And it becomes a bottleneck under load. I've seen orchestrators saturated at 500 orders/sec when single request latency was 50ms. Now all orders slow down proportionally.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Choreography vs. Orchestration Decision Framework</summary>
                    <div class="nested-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>Aspect</th>
                                    <th>Choreography</th>
                                    <th>Orchestration</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Control Flow</td>
                                    <td>Events trigger next step (distributed)</td>
                                    <td>Orchestrator decides (centralized)</td>
                                </tr>
                                <tr>
                                    <td>Visibility</td>
                                    <td>Poor (trace across logs)</td>
                                    <td>Excellent (single source of truth)</td>
                                </tr>
                                <tr>
                                    <td>Testing</td>
                                    <td>Hard (mock all service interactions)</td>
                                    <td>Easy (mock orchestrator responses)</td>
                                </tr>
                                <tr>
                                    <td>Scaling</td>
                                    <td>Linear (add service, add handler)</td>
                                    <td>Potential bottleneck (orchestrator limits throughput)</td>
                                </tr>
                                <tr>
                                    <td>Debugging</td>
                                    <td>Distributed (reconstruct from events)</td>
                                    <td>Centralized (read saga state)</td>
                                </tr>
                                <tr>
                                    <td>Best For</td>
                                    <td>Simple, linear, high-autonomy workflows</td>
                                    <td>Complex, branching, audit-heavy workflows</td>
                                </tr>
                            </tbody>
                        </table>
                        <br>
                        <strong>My Rule of Thumb:</strong> If you can draw the workflow in a simple left-to-right line with no branches, and it has &lt; 5 services, use choreography. The moment you need branching (fraud checks, A/B tests) or &gt; 5 services, switch to orchestration. The operational complexity of choreography exceeds the overhead of orchestration.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Compensating Transactions: The Hardest Part</summary>
                    <div class="nested-content">
                        <strong>What They Are:</strong> NOT automatic rollback. Explicit, deliberate business operations that undo side effects. This distinction is critical.<br><br>
                        <strong>Operations That Can't Be Compensated:</strong>
                        <ul>
                            <li><strong>Sending email:</strong> You can't "unsend." Best you can do is send a follow-up.</li>
                            <li><strong>External API calls:</strong> Refund API could fail. Now you're in an inconsistent state.</li>
                            <li><strong>Third-party account creation:</strong> Can't delete; risky. Better to deactivate.</li>
                        </ul>
                        <strong>Execution Order:</strong> Compensate in REVERSE order of successful execution. If steps 1, 2, 3 succeeded and 4 failed, compensate in order: 3, 2, 1.<br><br>
                        <strong>Idempotency:</strong> Every compensating transaction must be idempotent. If a network retry causes it to execute twice, the effect is the same as executing once. Use idempotency keys: hash of saga ID + step name.
                    </div>
                </details>

                <details class="nested-details">
                    <summary>Production Patterns: Handling Failures</summary>
                    <div class="nested-content">
                        <strong>Saga State Persistence:</strong> Store saga state in durable database, not memory. When the orchestrator crashes, it queries state, figures out where it left off, and resumes. Idempotency keys prevent duplicate operations on replay.<br><br>
                        <strong>Timeouts and Deadletter Queues:</strong> Set a timeout for each step. If a service doesn't respond within 30 seconds, assume failure and trigger compensation. Sagas that can't complete automatically go to a deadletter queue for manual review.<br><br>
                        <strong>Event Sourcing with Sagas:</strong> Store all saga events in append-only log. On restart, replay the log to reconstruct state. Invaluable for debugging and auditing.<br><br>
                        <strong>Monitoring:</strong> Track saga duration, failure rate by step, compensation frequency, deadletter queue size, state recovery latency. Spikes indicate service reliability issues.
                    </div>
                </details>

                <div class="interview-answer">
                    <strong>Interview Answer:</strong> "Sagas solve distributed transactions by breaking them into local transactions with compensation. Two coordination models: Choreography uses events. Services listen and react. It's loosely coupled and has no single point of failure. But flow is scattered. Debugging is hard because you reconstruct state from distributed logs. I use it for simple, linear workflows with &lt; 5 services. Orchestration uses a central Saga Orchestrator. It has total visibility and testability. But the orchestrator is a coordination point. If it fails, sagas stall. And it's a bottleneck under load. I use it for complex workflows with branching logic or &gt; 5 services. The trickiest part is compensating transactions. They're not automatic rollbacks — they're explicit business operations. Some can't be compensated (you can't 'unsend' an email). Execute compensation in reverse order. Every compensating transaction must be idempotent using idempotency keys. If the orchestrator crashes mid-saga, it needs to query persistent state, figure out where it left off, and retry using idempotency keys to avoid duplicates. In production, I track saga duration, failure rate by step, compensation frequency, and deadletter queue size to ensure the system is working correctly."
                </div>
            `);
        }

        const STORAGE_KEY = 'kafka-knowledge-graph-progress';
        const TOTAL_TOPICS = 8;

        function getProgress() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch { return {}; }
        }

        function saveProgress(progress) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch {}
        }

        function toggleTopic(index) {
            const progress = getProgress();
            progress[index] = !progress[index];
            saveProgress(progress);
            updateProgress();
            updatePillStates();
        }

        function updateProgress() {
            const progress = getProgress();
            const completed = Object.values(progress).filter(Boolean).length;
            const percentage = (completed / TOTAL_TOPICS) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${completed} / ${TOTAL_TOPICS} topics completed`;
        }

        function updatePillStates() {
            const progress = getProgress();
            const pills = document.querySelectorAll('.pill');
            pills.forEach((pill, idx) => {
                pill.classList.toggle('completed', !!progress[idx]);
            });
        }

        function addCheckboxes() {
            const progress = getProgress();
            const cards = document.querySelectorAll('details');
            cards.forEach((card, idx) => {
                const summary = card.querySelector('summary');
                if (summary && !summary.querySelector('.topic-checkbox')) {
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'topic-checkbox';
                    cb.checked = !!progress[idx];
                    cb.title = 'Mark as completed';
                    cb.onclick = (e) => { e.stopPropagation(); toggleTopic(idx); cb.checked = !!getProgress()[idx]; };
                    summary.appendChild(cb);
                }
            });
        }

        function initializePage() {
            renderNavPills();
            renderCards();
            addCheckboxes();
            updateProgress();
            updatePillStates();
            setupScrollTracking();
        }

        function setupScrollTracking() {
            const pills = document.querySelectorAll('.pill');
            const cards = document.querySelectorAll('details');

            window.addEventListener('scroll', () => {
                let current = 0;
                cards.forEach((card, idx) => {
                    if (card.getBoundingClientRect().top < window.innerHeight / 2) {
                        current = idx;
                    }
                });

                pills.forEach(pill => pill.classList.remove('active'));
                if (pills[current]) {
                    pills[current].classList.add('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
