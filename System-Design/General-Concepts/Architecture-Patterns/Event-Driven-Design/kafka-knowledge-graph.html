<body>
    <header>
        <div class="header-content">
            <h1>⚡ Kafka & Event-Driven Design Interview Prep</h1>
            <div class="progress-container">
                <div class="progress-label">
                    <span>Progress: <strong id="progress-count">0</strong>/8 topics completed</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <nav id="nav-pills"></nav>
        </div>
    </header>

    <main id="main-content"></main>

    <script>
        const topics = [
            {
                id: 'principles',
                title: 'Core Principles of Event-Driven Design',
                anchor: 'principles'
            },
            {
                id: 'messaging-options',
                title: 'Messaging Options',
                anchor: 'messaging-options'
            },
            {
                id: 'kafka-internals',
                title: 'Kafka Internals',
                anchor: 'kafka-internals'
            },
            {
                id: 'kafka-configs',
                title: 'Kafka Configurations',
                anchor: 'kafka-configs'
            },
            {
                id: 'delivery-semantics',
                title: 'Delivery Semantics',
                anchor: 'delivery-semantics'
            },
            {
                id: 'performance',
                title: 'Kafka Performance',
                anchor: 'performance'
            },
            {
                id: 'outbox-pattern',
                title: 'Outbox Pattern',
                anchor: 'outbox-pattern'
            },
            {
                id: 'saga-pattern',
                title: 'Saga Pattern',
                anchor: 'saga-pattern'
            }
        ];

        // Progress tracking
        function updateProgress() {
            const completed = topics.filter(t => localStorage.getItem(`topic-${t.id}`) === 'true').length;
            document.getElementById('progress-count').textContent = completed;
            document.getElementById('progress-fill').style.width = `${(completed / 8) * 100}%`;

            // Update nav pills
            topics.forEach(t => {
                const pill = document.querySelector(`[data-topic="${t.id}"]`);
                if (pill) {
                    if (localStorage.getItem(`topic-${t.id}`) === 'true') {
                        pill.classList.add('completed');
                    } else {
                        pill.classList.remove('completed');
                    }
                }
            });
        }

        function toggleTopic(topicId) {
            const isCompleted = localStorage.getItem(`topic-${topicId}`) === 'true';
            localStorage.setItem(`topic-${topicId}`, !isCompleted);
            updateProgress();
        }

        // Initialize nav
        const navPills = document.getElementById('nav-pills');
        topics.forEach((topic, idx) => {
            const pill = document.createElement('button');
            pill.className = 'nav-pill';
            pill.textContent = topic.title;
            pill.setAttribute('data-topic', topic.id);
            pill.onclick = (e) => {
                e.preventDefault();
                const element = document.getElementById(`section-${topic.id}`);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };
            navPills.appendChild(pill);
        });

        // Render all sections
        const mainContent = document.getElementById('main-content');

        // 1. PRINCIPLES
        mainContent.innerHTML += `
            <div id="section-principles" class="topic-section">
                <div class="topic-card">
                    <details>
                        <summary>
                            Core Principles of Event-Driven Design
                            <input type="checkbox" class="topic-checkbox" onchange="toggleTopic('principles')" />
                        </summary>
                        <div class="topic-content">
                            <div class="interview-answer">
                                <strong>Interview Answer:</strong> Event-driven architecture decouples services through asynchronous events, enabling scalability and loose coupling. Key principles include immutability of events, ordering guarantees per partition, and eventual consistency. Events represent facts about what happened, not commands—this distinction is critical. The system must handle duplicate events (idempotency), maintain clear event schema contracts, and support replaying for recovery or analysis.
                            </div>

                            <div class="content-section">
                                <h3 style="color: #00d4ff; margin-bottom: 1rem;">8 Core Principles</h3>
                                <ul>
                                    <li><strong>Events as Immutable Facts:</strong> Events record what happened, not what should happen. Once published, they cannot be modified, ensuring audit trail integrity.</li>
                                    <li><strong>Asynchronous Communication:</strong> Publishers don't wait for subscribers; enables loose coupling and independent scaling of services.</li>
                                    <li><strong>Eventual Consistency:</strong> Systems converge to consistent state over time. Replicas may lag; plan for temporary inconsistencies.</li>
                                    <li><strong>Event Ordering Guarantees:</strong> Total order within a partition; cross-partition order is not guaranteed. Design systems accordingly.</li>
                                    <li><strong>Partition Key Strategy:</strong> Choice of partition key determines parallelism and ordering constraints. Same entity ID = same partition = sequential processing.</li>
                                    <li><strong>Idempotency Requirement:</strong> Consumers must handle duplicate events (network retries, broker rebalancing). Use deduplication or idempotent operations.</li>
                                    <li><strong>Event Schema Evolution:</strong> Support backward/forward compatibility. Use versioning or flexible serialization (Avro, Protobuf) to add/remove fields safely.</li>
                                    <li><strong>Replay Capability:</strong> Store events immutably so systems can rebuild state by replaying from any offset. Critical for recovery and audit.</li>
                                    <li><strong>Observability by Design:</strong> Log event metadata (source, timestamp, correlation IDs) for tracing distributed transactions and debugging.</li>
                                    <li><strong>Temporal Decoupling:</strong> Producers and consumers need not run simultaneously. Consumers can catch up from stored events, enabling offline processing.</li>
                                </ul>
                            </div>

                            <div class="nested-collapsible">
                                <summary>Common Mistakes in Event-Driven Design</summary>
                                <div class="nested-content">
                                    <ul>
                                        <li><span class="keyword">Dual-write without transactional guarantees:</span> Writing to database AND publishing event in two separate operations = race condition. Use Outbox Pattern instead.</li>
                                        <li><span class="keyword">Treating events as commands:</span> Sending "CreateOrder" event implies intent, not fact. Should be "OrderCreated" after DB commit.</li>
                                        <li><span class="keyword">Ignoring ordering constraints:</span> Assuming cross-partition events arrive in sequence; they don't. Partition key choice is critical.</li>
                                        <li><span class="keyword">Not handling duplicates:</span> Network retries and rebalancing cause duplicate events. Consumer must be idempotent or use deduplication window.</li>
                                        <li><span class="keyword">Tight coupling to event schema:</span> Consumers break when event fields change. Use schema registry + versioning.</li>
                                        <li><span class="keyword">Loss of replay capability:</span> Deleting old events = losing history. Kafka retention must align with compliance/analysis needs.</li>
                                        <li><span class="keyword">No correlation IDs:</span> Cannot trace distributed transactions across services. Include correlation/trace IDs in event payload.</li>
                                        <li><span class="keyword">Failing to monitor lag:</span> Consumer lag growing undetected = system breakdown approaching. Monitor lag continuously.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
        `;

        // 2. MESSAGING OPTIONS
        mainContent.innerHTML += `
            <div id="section-messaging-options" class="topic-section">
                <div class="topic-card">
                    <details>
                        <summary>
                            Messaging Options
                            <input type="checkbox" class="topic-checkbox" onchange="toggleTopic('messaging-options')" />
                        </summary>
                        <div class="topic-content">
                            <div class="interview-answer">
                                <strong>Interview Answer:</strong> Kafka excels at high-throughput, durable event streaming with replay capability and strong ordering guarantees per partition. RabbitMQ offers flexible routing and complex topologies but is message-queue-oriented with weaker replay. AWS SQS provides simplicity and integration but no ordering (standard queue) and expensive at scale. Redis Pub/Sub is in-memory, fast, but ephemeral—no persistence. Google Pub/Sub sits between: managed, scalable, with some replay via BigQuery. Choice depends on throughput needs, persistence requirements, ordering guarantees, and operational complexity tolerance.
                            </div>

                            <table style="margin: 1.5rem 0;">
                                <thead>
                                    <tr>
                                        <th>Platform</th>
                                        <th>Delivery Guarantee</th>
                                        <th>Ordering</th>
                                        <th>Persistence</th>
                                        <th>Replay</th>
                                        <th>Best For</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><strong>Kafka</strong></td>
                                        <td>At-least-once (exactly-once with idempotence)</td>
                                        <td>Per-partition strong ordering</td>
                                        <td>Disk-based, configurable retention</td>
                                        <td>Full offset-based replay</td>
                                        <td>High-throughput event streaming, audit logs</td>
                                    </tr>
                                    <tr>
                                        <td><strong>RabbitMQ</strong></td>
                                        <td>At-most-once, At-least-once (publisher confirms + consumer acks)</td>
                                        <td>Per-queue ordering, no cross-queue guarantee</td>
                                        <td>In-memory + disk (durable queues)</td>
                                        <td>No native replay; messages consumed = gone</td>
                                        <td>Complex routing, request/reply patterns, microservices RPC</td>
                                    </tr>
                                    <tr>
                                        <td><strong>AWS SQS</strong></td>
                                        <td>At-least-once (standard); FIFO = exactly-once</td>
                                        <td>No ordering (standard); FIFO = strict ordering</td>
                                        <td>AWS managed; retention up to 14 days</td>
                                        <td>No replay; messages deleted on consumption</td>
                                        <td>Simple task queues, AWS ecosystem integration</td>
                                    </tr>
                                    <tr>
                                        <td><strong>Redis Pub/Sub</strong></td>
                                        <td>At-most-once (fire-and-forget)</td>
                                        <td>No strict ordering</td>
                                        <td>In-memory only; lost on restart</td>
                                        <td>No replay capability</td>
                                        <td>Real-time notifications, chat, live updates</td>
                                    </tr>
                                    <tr>
                                        <td><strong>Google Pub/Sub</strong></td>
                                        <td>At-least-once</td>
                                        <td>Per-subscription ordering (with ordering key)</td>
                                        <td>Google managed; 7-day default</td>
                                        <td>Seek to timestamp or snapshot</td>
                                        <td>GCP-native pipelines, BigQuery integration, managed service preference</td>
                                    </tr>
                                </tbody>
                            </table>

                            <div class="nested-collapsible">
                                <summary>Deep Dive: Why Kafka Over Others?</summary>
                                <div class="nested-content">
                                    <ul>
                                        <li><strong>Throughput:</strong> Kafka handles millions of events/sec. RabbitMQ typically peaks at tens of thousands.</li>
                                        <li><strong>Durability:</strong> Events stored on disk indefinitely (or by policy). Support for compliance (SEC records, HIPAA logs).</li>
                                        <li><strong>Replay:</strong> Consumers control their offset. Reprocess entire history or start fresh. RabbitMQ queues = destructive consumption.</li>
                                        <li><strong>Partition Strategy:</strong> Natural parallelism per partition with strong ordering. Scale horizontally without sacrificing causality per entity.</li>
                                        <li><strong>Maturity:</strong> Battle-tested at LinkedIn, Netflix, Uber, Airbnb. Vast ecosystem: Connectors, Stream processors (Kafka Streams, Flink).</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
        `;

        // 3. KAFKA INTERNALS
        mainContent.innerHTML += `
            <div id="section-kafka-internals" class="topic-section">
                <div class="topic-card">
                    <details>
                        <summary>
                            Kafka Internals
                            <input type="checkbox" class="topic-checkbox" onchange="toggleTopic('kafka-internals')" />
                        </summary>
                        <div class="topic-content">
                            <div class="interview-answer">
                                <strong>Interview Answer:</strong> Kafka's architecture centers on topics divided into partitions, each replicated across brokers. A partition is an ordered, immutable sequence of events; replicas ensure durability. The leader handles reads/writes; in-sync replicas (ISR) are replicas caught up with leader (lag below min.insync.replicas). Offsets track position within a partition, enabling consumers to resume from any point. Brokers coordinate via ZooKeeper (pre-4.0) or KRaft (4.0+). ISR contracts guarantee that losing brokers up to (N-1) doesn't lose committed data. Rebalancing redistributes partitions across brokers during topology changes.
                            </div>

                            <div class="content-section">
                                <h3 style="color: #00d4ff; margin-bottom: 1rem;">Key Concepts</h3>
                                <ul>
                                    <li><strong>Topic:</strong> A logical stream; like a table. Producers write to topics, consumers read from them.</li>
                                    <li><strong>Partition:</strong> A topic splits into N partitions for parallelism. Each partition is a single-leader replicated log. Messages in a partition have ordering.</li>
                                    <li><strong>Offset:</strong> Position within a partition. Incremental integer (0, 1, 2, ...). Consumer tracks committed offset to resume after restart.</li>
                                    <li><strong>Broker:</strong> A single Kafka server node. Stores partition replicas, serves read/write requests. Identified by broker ID.</li>
                                    <li><strong>Leader & Followers (Replicas):</strong> Each partition has 1 leader + N-1 followers. Leader handles all reads/writes. Followers replicate asynchronously.</li>
                                    <li><strong>In-Sync Replica (ISR):</strong> A follower whose lag (difference from leader's latest offset) is ≤ <code>replica.lag.time.max.ms</code>. Only ISR replicas can become leader (prevents data loss).</li>
                                    <li><strong>Replication Factor:</strong> Number of copies of each partition. RF=3 = 1 leader + 2 followers. Higher RF = durability, lower RF = faster writes.</li>
                                    <li><strong>Consumer Group:</strong> Multiple consumers reading same topic + sharing offsets. Each partition assigned to one consumer in group. Enables parallel consumption.</li>
                                </ul>
                            </div>

                            <h3 style="color: #00d4ff; margin-bottom: 1rem;">Kafka Cluster Architecture (3-Broker Example)</h3>
                            <pre class="terminal">
┌─────────────────────────────────────────────────────────────────┐
│                     Kafka Cluster (3 Brokers)                   │
├─────────────────────────────────────────────────────────────────┤
│                                                                 │
│  ┌──────────────────┐  ┌──────────────────┐  ┌──────────────────┐
│  │   Broker 1       │  │   Broker 2       │  │   Broker 3       │
│  │   (ID: 0)        │  │   (ID: 1)        │  │   (ID: 2)        │
│  ├──────────────────┤  ├──────────────────┤  ├──────────────────┤
│  │ Topic: Orders    │  │ Topic: Orders    │  │ Topic: Orders    │
│  │ Partition 0 [L]  │  │ Partition 0 [F]  │  │ Partition 0 [F]  │
│  │ Offset: 0-1000   │  │ Offset: 0-998    │  │ Offset: 0-1000   │
│  ├──────────────────┤  ├──────────────────┤  ├──────────────────┤
│  │ Topic: Orders    │  │ Topic: Orders    │  │ Topic: Orders    │
│  │ Partition 1 [F]  │  │ Partition 1 [L]  │  │ Partition 1 [F]  │
│  │ Offset: 0-950    │  │ Offset: 0-950    │  │ Offset: 0-949    │
│  ├──────────────────┤  ├──────────────────┤  ├──────────────────┤
│  │ Topic: Orders    │  │ Topic: Orders    │  │ Topic: Orders    │
│  │ Partition 2 [F]  │  │ Partition 2 [F]  │  │ Partition 2 [L]  │
│  │ Offset: 0-1050   │  │ Offset: 0-1050   │  │ Offset: 0-1050   │
│  └──────────────────┘  └──────────────────┘  └──────────────────┘
│       ISR: [0,1,2]      ISR: [0,1,2]         ISR: [0,1,2]
│
│  [L] = Leader,  [F] = Follower (Replica)
│  All followers in ISR mean RF=3 is healthy
│
│  ┌─────────────────────────────┐
│  │    ZooKeeper Cluster        │
│  │  (Or KRaft quorum in 4.0+)  │
│  │                             │
│  │  - Broker metadata          │
│  │  - Leader election          │
│  │  - ISR tracking             │
│  │  - Controller election      │
│  └─────────────────────────────┘
│
└─────────────────────────────────────────────────────────────────┘
            </pre>

                            <div class="nested-collapsible">
                                <summary>ZooKeeper vs KRaft (Kraft)</summary>
                                <div class="nested-content">
                                    <table style="margin: 1rem 0;">
                                        <thead>
                                            <tr>
                                                <th>Aspect</th>
                                                <th>ZooKeeper (Pre-4.0)</th>
                                                <th>KRaft (4.0+)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td><strong>Architecture</strong></td>
                                                <td>External cluster; Kafka depends on it</td>
                                                <td>Embedded in Kafka brokers (some as controllers)</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Operation</strong></td>
                                                <td>Separate deployment, monitoring, upgrade</td>
                                                <td>Simpler operations; fewer moving parts</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Metadata</strong></td>
                                                <td>Stored in ZK; brokers pull on change</td>
                                                <td>Stored in internal __cluster_metadata topic + memory</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Latency</strong></td>
                                                <td>~100ms metadata propagation</td>
                                                <td>Faster (~few ms) since metadata is local</td>
                                            </tr>

                            <div class="interview-answer">
                                <strong>Interview Answer:</strong> The Outbox Pattern solves the dual-write problem: ensure atomic updates to database AND Kafka event publishing. Instead of two operations, insert both database change and event into the same transaction. A background poller reads from the outbox table and publishes to Kafka, then marks as sent. This guarantees no lost or duplicate events. Alternative: use Change Data Capture (CDC) to stream database logs directly. Outbox is simpler to implement; CDC is more elegant but requires additional infrastructure.
                            </div>

                            <h3 style="color: #00d4ff; margin-bottom: 1rem;">Problem: The Dual-Write Dilemma</h3>
                            <pre class="terminal">
// ANTI-PATTERN: Two separate operations = race condition
BEGIN;
  UPDATE orders SET status = 'paid' WHERE id = 123;
COMMIT;

// What if process crashes here?
kafkaProducer.send(new ProducerRecord("orders",
  "OrderPaid", "{orderId: 123, amount: 100}"));

// Result: DB updated, but event never published.
// Other services never learn about state change.

┌──────────────────────────────────────────────────────────────┐
│                      Application Service                     │
└──────────────────────────────────────────────────────────────┘
                              │

                    │ DB Transaction      │
                    ├─────────────────────┤
                    │ orders table        │
                    │ outbox table        │  ← All in same TX
                    └─────────────────────┘
                              │
          ┌───────────────────┴───────────────────┐
          ▼                                       ▼
  ┌──────────────────┐              ┌─────────────────────┐
  │ orders_paid      │              │ outbox table:       │
  │ id=123, paid=Y   │              │ - id                │
  └──────────────────┘              │ - event_type        │
                                    │ - payload           │

                                    └─────────────────────┘
                              │

                    │  Outbox Poller     │
                    │  (background task) │
                    └────────┬───────────┘
                             │
                    ┌────────▼──────────┐
                    │ Kafka Topic:       │
                    │ "order-events"     │
                    └─────────────────────┘
            </pre>

                            <h3 style="color: #00d4ff; margin: 2rem 0 1rem 0;">Outbox Implementation Flow</h3>

                                    </tr>
                                    <tr>
                                        <td><strong>2. Poll Outbox</strong></td>
                                        <td>Background poller queries unpublished rows (is_published=false)</td>
                                        <td><code>SELECT * FROM outbox WHERE is_published=false ORDER BY id LIMIT 100</code></td>
                                    </tr>
                                    <tr>
                                        <td><strong>3. Publish to Kafka</strong></td>
                                        <td>Send batch of events to Kafka with acks=all (idempotent)</td>
                                        <td><code>kafkaProducer.send(record)</code> for each row</td>
                                    </tr>
                                    <tr>
                                        <td><strong>4. Mark Published</strong></td>
                                        <td>On success, update outbox: is_published=true, published_at=NOW()</td>
                                        <td><code>UPDATE outbox SET is_published=true WHERE id IN (...)</code></td>
                                    </tr>
                                    <tr>
                                        <td><strong>5. Clean Up</strong></td>
                                        <td>Periodically delete old published rows (archive if needed)</td>

  payload JSON NOT NULL,

  retry_count INT DEFAULT 0,
  last_error VARCHAR(500),

  INDEX idx_published (is_published, created_at),

                                        <li>Idempotent by design: Publishing same outbox row twice = idempotent event (partition key = aggregate_id).</li>
                                    </ul>
                                    <h4 style="color: #fbbf24; margin-bottom: 0.5rem; margin-top: 1rem;">Cons:</h4>

                                        <li>Poller tuning: Poll frequency affects latency; too frequent = CPU overhead.</li>
                                        <li>Not global ordering: Multiple services with outboxes = no global event order (use correlation IDs).</li>
                                    </ul>
                                </div>

                                        <li><strong>Disadvantage:</strong> Requires separate Debezium infrastructure; more operational complexity.</li>
                                    </ul>
                                    <p style="margin-top: 1rem;"><strong>When to use CDC:</strong> Existing data warehouse pipelines, high-scale deployments with mature infrastructure, or when you need real-time change capture for analytics.</p>
                                </div>

                            <h3 style="color: #00d4ff; margin-bottom: 1rem;">Saga Pattern Overview</h3>

                            <h3 style="color: #00d4ff; margin: 2rem 0 1rem 0;">Pattern 1: Choreography (Event-Driven)</h3>
                            <pre class="terminal">
1. OrderService creates order

2. PaymentService listens to OrderCreated
   ├─► Charges customer
   └─► Event: PaymentProcessed

   ├─► Reserves stock
   └─► Event: StockReserved

4. ShippingService listens to StockReserved
   ├─► Plans shipment
   └─► Event: ShipmentPlanned

Failure Case: PaymentService fails to charge
   ├─► Event: PaymentFailed
   └─► OrderService, InventoryService, ShippingService
       listen and compensate (cancel order, release reserved stock, etc.)

Services are loosely coupled via events.
No central coordinator.
            </pre>

    └─ Rollback Step 1: OrderService.cancel(...)

Orchestrator has full visibility and control.
Tight coupling on orchestrator.

class OrderSaga {
  async execute(orderId) {
    const saga = new SagaExecution(orderId);

    try {
      // Step 1: Create order
      const order = await OrderService.createOrder(orderId);
      saga.log("CreateOrder", "SUCCESS", order);

      // Step 2: Process payment
      const payment = await PaymentService.charge(order.customerId, order.total);
      saga.log("Charge", "SUCCESS", payment);

      // Step 3: Reserve inventory
      const reservation = await InventoryService.reserve(order.items);
      saga.log("Reserve", "SUCCESS", reservation);

      // Step 4: Plan shipment
      const shipment = await ShippingService.ship(order.id, order.address);
      saga.log("Ship", "SUCCESS", shipment);

      // All steps succeeded
      saga.markCompleted();

    } catch (error) {
      // Rollback in reverse order
      saga.log(currentStep, "FAILED", error);

      // Undo Step 3
      if (saga.isCompleted("Reserve")) {
        await InventoryService.cancelReservation(reservationId);
      }

      // Undo Step 2
      if (saga.isCompleted("Charge")) {
        await PaymentService.refund(paymentId);
      }

      // Undo Step 1
      if (saga.isCompleted("CreateOrder")) {
        await OrderService.cancelOrder(orderId);
      }

      saga.markRolledBack();
      throw error;
    }
  }
}

// Idempotency check in each service:
async charge(customerId, amount) {
  const idempotencyKey = \`\${customerId}-\${orderId}-\${timestamp}\`;
  const existing = await db.query("SELECT * FROM payments WHERE idempotency_key = ?", [idempotencyKey]);

  if (existing) {
    return existing;  // Duplicate request; return cached result
  }

  const result = await paymentGateway.charge(customerId, amount);
  await db.insert("payments", { idempotencyKey, result });
  return result;
}
